default_language_version:
  python: python3.14

repos:
  # Ruff: linting + import sorting + auto-fix
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args:
          - --fix
          - --exit-non-zero-on-fix
          - --show-fixes
      - id: ruff-format

  # Mypy: static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0.0
          - types-jsonschema
          - "types-PyYAML>=6.0.0"
        args:
          - --ignore-missing-imports

  # Auto-sync requirements.txt from uv.lock - used for snyk - later addition - TODO
  - repo: local
    hooks:
      - id: sync-requirements
        name: Sync requirements.txt from uv.lock
        language: system
        entry: bash -c 'uv export --no-hashes --format requirements-txt > requirements.txt && git add requirements.txt'
        files: (pyproject\.toml|uv\.lock)$
        pass_filenames: false

  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-ast
      - id: check-builtin-literals

  # Optional: pretty-format-json (auto-format JSON configs)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: pretty-format-json
